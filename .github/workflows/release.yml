name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches module version
        run: |
          test "v$(jq -r .version module.json)" = "${GITHUB_REF_NAME}"
      - name: Verify changelog has an entry for this version
        run: |
          version="$(jq -r .version module.json)"
          grep -qE "^## \[${version}\] " CHANGELOG.md \
            || { echo "::error::CHANGELOG.md has no entry for ${version} — run 'npm run changelog' and commit"; exit 1; }
      - name: Pin download URL to this release
        run: |
          jq --arg tag "${GITHUB_REF_NAME}" \
            '.download = "https://github.com/bularzik/campaign-record/releases/download/\($tag)/module.zip"' \
            module.json > module.json.tmp && mv module.json.tmp module.json
      - name: Build module archive
        # scripts/testing/ is intentionally included: scripts/campaign-record.mjs
        # imports ./testing/quench.mjs, so excluding it would break the shipped module.
        # vendor/ holds the mammoth (docx import) and docx (export) bundles that
        # vendor-loader.mjs fetches at runtime; omitting it 404s the importer.
        run: zip -r module.zip module.json README.md CHANGELOG.md LICENSE scripts templates styles lang vendor
      - name: Verify required runtime assets are packaged
        # Fail the release instead of shipping a zip that 404s at runtime.
        run: |
          required=(
            module.json
            scripts/campaign-record.mjs
            styles/campaign-record.css
            lang/en.json
            vendor/mammoth.browser.min.js
            vendor/docx.iife.js
            CHANGELOG.md
          )
          for f in "${required[@]}"; do
            unzip -l module.zip | grep -qE "[[:space:]]${f}$" || { echo "::error::missing $f in module.zip"; exit 1; }
          done
      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
