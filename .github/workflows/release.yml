name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build module archive
        run: zip -r module.zip module.json scripts templates styles lang
      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
